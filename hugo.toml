 baseURL = 'https://blog.iraalulkar.com/'
 locale = 'en-us'
 title = "Ira's Blog"
 theme = 'notrack'

 showTaxonomyLinks = false

 # Explicitly define taxonomies (also makes it easy to add more later)
 [taxonomies]
   category = "categories"
   tag = "tags"

 # ── Main menu ──────────────────────────────────────────────────────────────
 # No `parent` field on any item = no hover dropdowns, just flat links

 [[menu.main]]
   name   = "Writings"
   url    = "/writings/"
   weight = 10

 [[menu.main]]
   name   = "Thoughts"
   url    = "/thoughts/"
   weight = 20

 [[menu.main]]
   name   = "Categories"
   url    = "/categories/"
   weight = 30

 [[menu.main]]
   name   = "Tags"
   url    = "/tags/"
   weight = 40


